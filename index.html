<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="img/android-chrome-192x192.png" rel="icon" type="image/png" />
    <link href="css/styles.css" rel="stylesheet" type="text/css" />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"

  <body>
    <header class="main-header">
      <nav class="navbar">
        <div class="logo">
          <span class="M">M</span><span class="GD">GD</span>
        </div>
        <ul class="nav-links">
          <li><a href="#sobre-mí">Sobre mí</a></li>
          <li><a href="#proyectos">Proyectos</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>

    <main>
      <section class="hero">
        <div class="hero-content">
          <h1>Soy <span class="nombre">Michelle</span>,</h1>
          <p class="estudios">
            estudiante

            <span class="udit">UDIT</span>

        <div class="herramientas-container">

              <img src="img/psd.png" alt="Photoshop" />

            <div class="icono">
              <img src="img/ai.png" alt="Illustrator" />

            </div>
            <div class="icono">
              <img src="img/id.png" alt="Indesign" />
              <p>Indesign</p>
            </div>
            <div class="icono">
              <img src="img/figma.png" alt="Figma" />
              <p>Figma</p>
            </div>
            <div class="icono">
              <img src="img/c4d.png" alt="Cinema4D" />
              <p>Cinema 4D</p>
            </div>

        </div>
